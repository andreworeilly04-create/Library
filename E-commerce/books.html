<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/purple book.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="script.js"></script>
    <title>Library | Books</title>
</head>

<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
                <img class="logo" src="assets/Library.svg" alt="Logo">
                <ul class="nav__links">
                    <li><a href="index.html" class="nav__link">Home</a></li>
                    <li><a href="#" class="nav__link">Contact</a></li>
                    <li><a href="#" class="nav__link nav__link--primary">Books</a></li>
                </ul>

                <button class="btn__menu" onclick="openMenu()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="menu_backdrop">
                    <button class="btn__menu btn__menu--close" onclick="closeMenu()">
                        <i class="fas fa-times"></i>
                    </button>
                    <ul class="menu__links menu--open">
                        <li class="menu__list"><a href="#" class="menu__link" onclick="closeMenu()">Home</a></li>
                        <li class="menu__list"><a href="#" class="menu__link" onclick="closeMenu()">Books</a></li>
                        <li class="menu__list"><a href="#" class="menu__link" onclick="closeMenu()">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <main id="books__main">
            <section>
                <div class="container">
                    <div class="row">
                        <div class="books__header">
                            <h2 class="section__title books__header--title">
                                All <span class="purple">Books</span>
                            </h2>
                            <select id="filter" onchange="filterBooks(event)">
                                <option value="" disabled selected>Sort</option>
                                <option value="LOW_TO_HIGH">Price, Low to High</option>
                                <option value="HIGH_TO_LOW">Price, High to Low</option>
                                <option value="RATING">Rating</option>
                            </select>
                        </div>
                       <div class="books books__loading">
                        <i class="fas fa-spinner books__loading--spinner"></i>
                       </div>
                    </div>
            </section>
        </main>
        <footer>
            <div class="container">
                <div class="row row__column">
                    <a href="#">
                        <figure class="footer__logo">
                            <img src="./assets/Library.svg" class="footer__logo--img" alt="Footer Logo">
                        </figure>
                    </a>
                    <div class="footer__list">
                        <a href="" class="footer__link">Home</a>
                        <a href="" class="footer__link no--cursor">About</a>
                        <a href="" class="footer__link">Books</a>
                        <a href="" class="footer__link no--cursor">Contact</a>
                    </div>
                    <div class="footer__copyright">
                        <p>Copyright &copy; 2026 Library, Orlando Florida</p>
                    </div>
                </div>
            </div>
        </footer>
</body>

</html>
